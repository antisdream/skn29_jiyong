# upstream 정의: Windows 환경에서 기동 중인 Waitress TCP 주소(127.0.0.1:8000)를 연결합니다.
# Nginx Windows 버전은 UNIX 도메인 소켓 방식을 지원하지 않으므로 TCP 방식을 사용합니다.
upstream django_app {
    server 127.0.0.1:8000;
}

server {
    listen 80;
    server_name localhost;

    # 파일 업로드 크기 제한 해제 (50MB)
    client_max_body_size 50M;

    # Gzip 압축 전송 설정
    gzip on;
    gzip_comp_level 5;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # 로깅 파일 설정 (Windows Nginx의 기본 logs 폴더 내에 저장)
    access_log logs/django_access.log;
    error_log logs/django_error.log;

    # 정적 파일 직접 서빙
    location /static/ {
        alias "C:/python-src/Daily/4. AI Application Development/day73/staticfiles/";
        expires 30d;
        add_header Cache-Control "public, no-transform";
        access_log off;
    }

    # 미디어 파일 직접 서빙
    location /media/ {
        alias "C:/python-src/Daily/4. AI Application Development/day73/media/";
        expires 7d;
        add_header Cache-Control "public, no-transform";
    }

    # 모든 일반 동적 요청을 Waitress WAS로 프록싱
    location / {
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Host $http_host;

        # 리다이렉트 충돌 방지
        proxy_redirect off;

        # 정의된 TCP upstream으로 패스
        proxy_pass http://django_app;
    }
}

server {
    listen 443 ssl;
    server_name localhost;

    ssl_certificate C:/nginx-1.30.3/certs/django.crt;
    ssl_certificate_key C:/nginx-1.30.3/certs/django.key;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # 파일 업로드 크기 제한 해제 (50MB)
    client_max_body_size 50M;

    # Gzip 압축 전송 설정
    gzip on;
    gzip_comp_level 5;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # 보안 헤더 추가
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Content-Security-Policy "default-src 'self' http: https: data: blob: 'unsafe-inline'" always;

    # 로깅 파일 설정 (Windows Nginx의 기본 logs 폴더 내에 저장)
    access_log logs/django_ssl_access.log;
    error_log logs/django_ssl_error.log;

    # 정적 파일 직접 서빙
    location /static/ {
        alias "C:/python-src/Daily/4. AI Application Development/day73/staticfiles/";
        expires 30d;
        add_header Cache-Control "public, no-transform";
        access_log off;
    }

    # 미디어 파일 직접 서빙
    location /media/ {
        alias "C:/python-src/Daily/4. AI Application Development/day73/media/";
        expires 7d;
        add_header Cache-Control "public, no-transform";
    }

    # 모든 일반 동적 요청을 Waitress WAS로 프록싱
    location / {
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Host $http_host;

        # 리다이렉트 충돌 방지
        proxy_redirect off;

        # 정의된 TCP upstream으로 패스
        proxy_pass http://django_app;
    }
}
