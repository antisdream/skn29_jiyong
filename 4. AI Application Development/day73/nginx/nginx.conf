worker_processes  1;

events {
    worker_connections  1024;
}

http {
    include       C:/nginx-1.30.3/conf/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout  65;

    upstream django_app {
        server 127.0.0.1:8000;
    }

    # HTTP(80) 기존 접속 유지
    server {
        listen 80;
        server_name localhost;

        client_max_body_size 50M;

        gzip on;
        gzip_comp_level 5;
        gzip_min_length 1024;
        gzip_proxied any;
        gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

        access_log logs/django_access.log;
        error_log logs/django_error.log;

        location /static/ {
            alias "C:/python-src/Daily/4. AI Application Development/day73/staticfiles/";
            expires 30d;
            add_header Cache-Control "public, no-transform";
            access_log off;
        }

        location /media/ {
            alias "C:/python-src/Daily/4. AI Application Development/day73/media/";
            expires 7d;
            add_header Cache-Control "public, no-transform";
        }

        location / {
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Host $http_host;
            proxy_redirect off;
            proxy_pass http://django_app;
        }
    }

    # HTTPS(443) 보안 서버
    server {
        listen 443 ssl;
        server_name localhost;

        ssl_certificate C:/nginx-1.30.3/certs/django.crt;
        ssl_certificate_key C:/nginx-1.30.3/certs/django.key;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;

        client_max_body_size 50M;

        gzip on;
        gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Content-Security-Policy "default-src 'self' http: https: data: blob: 'unsafe-inline'" always;

        access_log logs/django_ssl_access.log;
        error_log logs/django_ssl_error.log;

        location /static/ {
            alias "C:/python-src/Daily/4. AI Application Development/day73/staticfiles/";
            expires 30d;
            add_header Cache-Control "public, no-transform";
            access_log off;
        }

        location /media/ {
            alias "C:/python-src/Daily/4. AI Application Development/day73/media/";
            expires 7d;
            add_header Cache-Control "public, no-transform";
        }

        location / {
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header Host $http_host;
            proxy_redirect off;
            proxy_pass http://django_app;
        }
    }
}
