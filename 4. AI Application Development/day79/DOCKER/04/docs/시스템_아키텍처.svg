<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="800" viewBox="0 0 1000 800" font-family="Segoe UI, Malgun Gothic, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#4b5563"/>
    </marker>
  </defs>

  <rect width="1000" height="800" fill="#ffffff"/>

  <!-- ===== 상단 행: 좌(40) / 중앙(500) / 우(960) 기준 정렬, EC2 박스 폭(40~960)과 일치 ===== -->

  <!-- Elastic IP: EC2 박스 왼쪽 끝(40)과 정렬 -->
  <rect x="40" y="16" width="260" height="70" rx="8" fill="#e0f2fe" stroke="#0369a1" stroke-width="1.5"/>
  <text x="170" y="42" text-anchor="middle" font-size="13" font-weight="bold" fill="#0c4a6e">AWS Elastic IP (고정)</text>
  <text x="170" y="62" text-anchor="middle" font-size="10" fill="#0c4a6e">인스턴스 재생성해도 유지</text>

  <!-- 사용자 브라우저: 정중앙(500) -->
  <rect x="410" y="16" width="180" height="50" rx="8" fill="#e5e7eb" stroke="#6b7280" stroke-width="1.5"/>
  <text x="500" y="46" text-anchor="middle" font-size="14" fill="#111827">사용자 브라우저</text>

  <!-- GitHub Actions: EC2 박스 오른쪽 끝(960)과 정렬 -->
  <rect x="700" y="16" width="260" height="80" rx="8" fill="#ede9fe" stroke="#6d28d9" stroke-width="1.5"/>
  <text x="830" y="40" text-anchor="middle" font-size="13" font-weight="bold" fill="#4c1d95">GitHub Actions</text>
  <text x="830" y="58" text-anchor="middle" font-size="10" fill="#4c1d95">main 병합 → Secrets(EC2_HOST,</text>
  <text x="830" y="74" text-anchor="middle" font-size="10" fill="#4c1d95">EC2_SSH_KEY)로 SSH 배포</text>

  <line x1="500" y1="66" x2="500" y2="108" stroke="#4b5563" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="512" y="92" font-size="11" fill="#4b5563">HTTPS (myeongga.site)</text>

  <!-- ===== AWS EC2 outer box: x=40~960 (폭 920), y=112~592 ===== -->
  <rect x="40" y="112" width="920" height="480" rx="10" fill="#f8fafc" stroke="#334155" stroke-width="2" stroke-dasharray="6 4"/>
  <text x="60" y="138" font-size="14" font-weight="bold" fill="#334155">AWS EC2 — Docker Compose (docker-compose.4th.yml)</text>

  <!-- Nginx: 중앙 정렬 (x=330~670, 중심 500) -->
  <rect x="330" y="160" width="340" height="95" rx="8" fill="#dcfce7" stroke="#15803d" stroke-width="1.5" stroke-dasharray="5 3"/>
  <text x="500" y="184" text-anchor="middle" font-size="14" font-weight="bold" fill="#14532d">Nginx</text>
  <text x="500" y="202" text-anchor="middle" font-size="11" fill="#14532d">Docker · 80/443 호스트 퍼블리시</text>
  <text x="500" y="218" text-anchor="middle" font-size="10" fill="#14532d">80→443 리다이렉트, Let's Encrypt SSL 종료</text>
  <text x="500" y="234" text-anchor="middle" font-size="10" fill="#14532d">유일하게 외부 노출되는 컨테이너</text>

  <!-- branch labels -->
  <line x1="410" y1="255" x2="300" y2="305" stroke="#4b5563" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="325" y="282" font-size="12" fill="#4b5563">location /</text>

  <line x1="590" y1="255" x2="700" y2="305" stroke="#4b5563" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="640" y="282" font-size="12" fill="#4b5563">location /api/</text>

  <!-- Django: 왼쪽 (x=140~460, 중심 300), FastAPI: 오른쪽 (x=540~860, 중심 700) — 500 기준 대칭 -->
  <rect x="140" y="305" width="320" height="115" rx="8" fill="#dcfce7" stroke="#15803d" stroke-width="1.5" stroke-dasharray="5 3"/>
  <text x="300" y="332" text-anchor="middle" font-size="14" font-weight="bold" fill="#14532d">Django (Gunicorn)</text>
  <text x="300" y="354" text-anchor="middle" font-size="11" fill="#14532d">Docker · 내부 네트워크 8000</text>
  <text x="300" y="372" text-anchor="middle" font-size="11" fill="#14532d">MVT / ORM / 인증</text>
  <text x="300" y="390" text-anchor="middle" font-size="11" fill="#14532d">회원가입 · 로그인 · 작명 이력</text>

  <rect x="540" y="305" width="320" height="115" rx="8" fill="#dcfce7" stroke="#15803d" stroke-width="1.5" stroke-dasharray="5 3"/>
  <text x="700" y="332" text-anchor="middle" font-size="14" font-weight="bold" fill="#14532d">FastAPI</text>
  <text x="700" y="354" text-anchor="middle" font-size="11" fill="#14532d">Docker · 내부 네트워크 8001</text>
  <text x="700" y="372" text-anchor="middle" font-size="11" fill="#14532d">naming_graph.py 래핑 · POST /ask</text>
  <text x="700" y="390" text-anchor="middle" font-size="11" fill="#14532d">ChromaDB 임베디드(PersistentClient)</text>

  <!-- FastAPI -> Neo4j -->
  <line x1="650" y1="420" x2="580" y2="450" stroke="#4b5563" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Neo4j: 중앙 정렬 (Nginx와 동일 x=330~670) -->
  <rect x="330" y="450" width="340" height="70" rx="8" fill="#dcfce7" stroke="#15803d" stroke-width="1.5" stroke-dasharray="5 3"/>
  <text x="500" y="476" text-anchor="middle" font-size="14" font-weight="bold" fill="#14532d">Neo4j</text>
  <text x="500" y="496" text-anchor="middle" font-size="11" fill="#14532d">Docker · 한자-오행 관계 그래프</text>

  <!-- legend: FastAPI 열(540~860) 아래, EC2 박스 안쪽에 완전히 포함 -->
  <rect x="670" y="545" width="16" height="16" fill="#dcfce7" stroke="#15803d" stroke-width="1.5" stroke-dasharray="4 2"/>
  <text x="694" y="558" font-size="11" fill="#334155">Docker 컨테이너 (Compose 네트워크로 연결)</text>

  <!-- Django -> RDS / S3 -->
  <line x1="300" y1="420" x2="300" y2="650" stroke="#4b5563" stroke-width="1.5"/>
  <line x1="300" y1="650" x2="180" y2="700" stroke="#4b5563" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="300" y1="650" x2="500" y2="700" stroke="#4b5563" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ===== 하단 행: EC2 박스와 동일한 x=40~960 범위에 3등분 정렬 ===== -->

  <!-- AWS RDS -->
  <rect x="40" y="700" width="280" height="80" rx="8" fill="#fef3c7" stroke="#b45309" stroke-width="1.5"/>
  <text x="180" y="724" text-anchor="middle" font-size="14" font-weight="bold" fill="#78350f">AWS RDS</text>
  <text x="180" y="744" text-anchor="middle" font-size="11" fill="#78350f">PostgreSQL · 사용자 DB</text>
  <text x="180" y="760" text-anchor="middle" font-size="10" fill="#78350f">보안 그룹: EC2에서만 5432 허용</text>

  <!-- AWS S3 -->
  <rect x="360" y="700" width="280" height="80" rx="8" fill="#fef3c7" stroke="#b45309" stroke-width="1.5"/>
  <text x="500" y="724" text-anchor="middle" font-size="14" font-weight="bold" fill="#78350f">AWS S3</text>
  <text x="500" y="744" text-anchor="middle" font-size="11" fill="#78350f">정적 파일 / 미디어</text>
  <text x="500" y="760" text-anchor="middle" font-size="10" fill="#78350f">django-storages 연동</text>

  <!-- Security group note -->
  <rect x="680" y="700" width="280" height="80" rx="8" fill="#fee2e2" stroke="#b91c1c" stroke-width="1.5"/>
  <text x="820" y="724" text-anchor="middle" font-size="12" font-weight="bold" fill="#7f1d1d">보안 그룹 (인바운드)</text>
  <text x="820" y="744" text-anchor="middle" font-size="11" fill="#7f1d1d">22·80·443 전체 개방 (22는 Actions 배포용)</text>
  <text x="820" y="760" text-anchor="middle" font-size="11" fill="#7f1d1d">Django·FastAPI·Neo4j 포트 미오픈</text>
</svg>
